global:
  scrape_interval: 15s # How often to scrape targets
  evaluation_interval: 15s # How often to evaluate rules

# Scrape configurations
scrape_configs:
  - job_name: 'aero-telemetry'
    static_configs:
      - targets: ['localhost:9090'] # Replace with actual telemetry exporter address

  # Example setup for Edge AI metrics
  - job_name: 'edge-ai-vision'
    static_configs:
      - targets: ['edge-node.local:8000'] 
